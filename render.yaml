services:
  - type: web
    name: studyconnect-api
    runtime: node
    rootDir: BE
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Các biến sau cần nhập trên Render dashboard:
      # DATABASE_URL    - từ Neon PostgreSQL
      # JWT_SECRET      - studyconnect_super_secret_jwt_key_2026
      # JWT_REFRESH_SECRET - studyconnect_super_secret_refresh_key_2026
      # GEMINI_API_KEY  - Google Gemini API key
      # CORS_ORIGIN     - https://your-app.vercel.app
